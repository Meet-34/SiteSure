<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SiteAudit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet" />
</head>
<style>
  html,
  body {
    height: 100%;
    overflow: hidden;
  }

  body {
    margin: 0%;
    padding: 0%;
    font-family: "Poppins", sans-serif;
    color: white;
    background-color: black;
    height: 100vh;
  }

  img.bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -1;
    opacity: 0.65;
  }

  .nav {
    display: flex;
    gap: 50px;
    align-items: center;
  }

  .nav a {
    text-decoration: none;
    color: white;
    font-size: 20px;
    font-weight: 500;
    transition: scale 0.2s ease;
    font-family: "Poppins", sans-serif;
  }

  .nav a:hover {
    scale: 1.05;
  }

  /* Sign out styled differently to stand out */
  .nav a#authNavBtn.signout {
    color: rgb(255, 255, 255);
    border: 1px solid rgb(255, 255, 255);
    padding: 4px 16px;
    border-radius: 6px;
    font-size: 18px;
    transition:
      background 0.2s,
      scale 0.2s ease;
  }

  .nav a#authNavBtn.signout:hover {
    background: rgba(255, 173, 20, 0.15);
    scale: 1.05;
  }

  .header {
    display: flex;
    padding: 8px 20px;
    justify-content: space-between;
    align-items: center;
    background-color: #0028198d;
    border: 2px solid #0028198d;
    border-radius: 12px;
    /* border-bottom: 1px solid #ccc; */
    height: auto;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(8px);
    margin: 8px;
  }

  /* Brand logo + name on the left */
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }

  .brand-logo {
    width: 41px;
    height: 41px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(238, 237, 236, 0.425);
    box-shadow: 0 0 10px #202b35;
    flex-shrink: 0;
    position: static;
    opacity: 1;
  }

  .brand-name {
    font-size: 24px;
    font-weight: 700;
    color: rgb(237, 236, 234);
    letter-spacing: 1px;
    text-shadow: 0px 2px 8px rgba(0, 0, 0, 0.7);
    white-space: nowrap;
  }

  main {
    height: 100vh;
    /* full screen height */
    display: flex;
    justify-content: center;
    /* horizontal center */
    align-items: center;
    /* vertical center */
    text-align: center;
    position: relative;
    z-index: 2;
    /* keeps text above background image */
    font-weight: bold;
  }

  main p {
    /* max-width: 800px; */
    font-size: 32px;
    color: white;
    line-height: 1.2;
    padding: 0 20px;
    text-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
    font-family: "Playfair Display", serif;
    animation: fadeIn 1.5s ease-in-out;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(20px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Greeting pill shown when logged in */
  .user-greeting {
    display: none;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.6);
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.15);
    padding: 4px 14px;
    border-radius: 20px;
  }

  .user-greeting.visible {
    display: flex;
  }

  .user-greeting img {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    position: static;
    opacity: 1;
    object-fit: cover;
  }

  /* Auth Popup */
  .auth-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .auth-overlay.show {
    display: flex;
  }

  .auth-popup {
    background: rgba(10, 10, 10, 0.95);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 16px;
    padding: 36px 32px;
    text-align: center;
    max-width: 360px;
    width: 90%;
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
    animation: popIn 0.2s ease;
  }

  @keyframes popIn {
    from {
      transform: scale(0.92);
      opacity: 0;
    }

    to {
      transform: scale(1);
      opacity: 1;
    }
  }

  .auth-popup .lock-icon {
    font-size: 40px;
    margin-bottom: 12px;
  }

  .auth-popup h3 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .auth-popup p {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.55);
    margin-bottom: 24px;
    text-shadow: none;
  }

  .auth-popup .btn-signin {
    display: block;
    width: 100%;
    padding: 11px;
    background: rgb(255, 173, 20);
    color: black;
    font-family: "Poppins", sans-serif;
    font-size: 15px;
    font-weight: 700;
    border: 1px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    margin-bottom: 10px;
    box-shadow: 0 2px 12px rgba(255, 173, 20, 0.35);
    transition: opacity 0.2s;
    box-sizing: border-box;
  }

  .auth-popup .btn-signin:hover {
    opacity: 0.88;
  }

  .auth-popup .btn-cancel {
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: rgba(255, 255, 255, 0.6);
    font-family: "Poppins", sans-serif;
    font-size: 14px;
    padding: 9px;
    width: 100%;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
    box-sizing: border-box;
  }

  .auth-popup .btn-cancel:hover {
    background: rgba(255, 255, 255, 0.07);
  }
</style>

<body>
  <img class="bg" src="../images/site2.avif" alt="" />

  <!-- Auth required popup -->
  <div class="auth-overlay" id="authOverlay">
    <div class="auth-popup">
      <div class="lock-icon">🔒</div>
      <h3>Sign in required</h3>
      <p id="popupMsg">You need to be signed in to access this page.</p>
      <a href="/login" class="btn-signin">Sign In</a>
      <button class="btn-cancel" onclick="closePopup()">Maybe later</button>
    </div>
  </div>

  <div class="header">
    <!-- Brand: logo + site name on the left -->
    <a href="/" class="brand">
      <img class="brand-logo" src="../images/logo3.jpg" />
      <span class="brand-name">SiteAudit</span>
    </a>

    <!-- Nav links on the right -->
    <div class="nav">
      <a href="/">Home</a>
      <a href="#" onclick="guardedNav(event, '/materiallog', 'Logs')">Logs</a>
      <a href="#" onclick="guardedNav(event, '/gallery', 'Gallery')">Reports</a>
      <a href="/about">About</a>
      <!-- greeting shown when logged in -->
      <span class="user-greeting" id="userGreeting">
        <img id="userAvatar" src="" alt="" />
        <span id="userName"></span>
      </span>
      <!-- dynamically becomes Login or Sign Out -->
      <a href="#" id="authNavBtn" onclick="handleAuthClick(event)">Login</a>
    </div>
  </div>

  <main>
    <!-- <h1>SiteSure</h1> -->
    <i>
      <p>
        "Ensuring construction quality through daily monitoring, <br />
        precise reporting, and consistent accountability"
      </p>
    </i>
  </main>
  <footer>
    <!-- <button>+ Add Report📝</button> -->
  </footer>

  <script>
    const authBtn = document.getElementById("authNavBtn");
    const userGreeting = document.getElementById("userGreeting");
    const userNameEl = document.getElementById("userName");
    const userAvatarEl = document.getElementById("userAvatar");

    function updateNav() {
      const raw = localStorage.getItem("user");
      if (raw) {
        const user = JSON.parse(raw);

        // Show greeting
        userNameEl.textContent = user.name?.split(" ")[0] || user.email;
        if (user.picture) {
          userAvatarEl.src = user.picture;
          userAvatarEl.style.display = "inline-block";
        } else {
          userAvatarEl.style.display = "none";
        }
        userGreeting.classList.add("visible");

        // Switch to Sign Out
        authBtn.textContent = "Sign Out";
        authBtn.classList.add("signout");
        authBtn.removeAttribute("href");
      } else {
        // Not logged in — show Login link
        userGreeting.classList.remove("visible");
        authBtn.textContent = "Login";
        authBtn.classList.remove("signout");
        authBtn.href = "login";
      }
    }

    function handleAuthClick(e) {
      const raw = localStorage.getItem("user");
      if (raw) {
        // Signed in → sign out
        e.preventDefault();
        localStorage.removeItem("user");
        updateNav();
      }
      // else: href="login.html" handles the navigation naturally
    }

    // Run on page load
    updateNav();

    function guardedNav(e, url, pageName) {
      e.preventDefault();
      if (localStorage.getItem("user")) {
        window.location.href = url;
      } else {
        document.getElementById("popupMsg").textContent =
          `You need to be signed in to access the ${pageName} page.`;
        document.getElementById("authOverlay").classList.add("show");
      }
    }

    function closePopup() {
      document.getElementById("authOverlay").classList.remove("show");
    }

    // Close on backdrop click
    document
      .getElementById("authOverlay")
      .addEventListener("click", function (e) {
        if (e.target === this) closePopup();
      });
  </script>
</body>

</html>
