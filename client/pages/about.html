<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About — SiteAudit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      font-family: "Poppins", sans-serif;
      color: white;
    }

    img.bg {
      object-fit: cover;
      width: 100%;
      height: 100%;
      position: fixed;
      z-index: -1;
    }

    .header {
      display: flex;
      padding: 8px 20px;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      margin: 8px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .brand-logo {
      width: 41px;
      height: 41px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(238, 237, 236, 0.425);
    }

    .brand-name {
      font-size: 24px;
      font-weight: 700;
    }

    .nav {
      display: flex;
      gap: 50px;
      align-items: center;
    }

    .nav a {
      text-decoration: none;
      color: white;
      font-size: 20px;
    }

    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100vh - 70px);
      text-align: center;
      padding: 0 40px;
    }

    .main h1 {
      font-size: 60px;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .main p {
      font-size: 18px;
      max-width: 780px;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: -1;
    }

    .user-greeting {
      display: none;
      align-items: center;
      gap: 8px;
    }

    .user-greeting.visible {
      display: flex;
    }

    .nav a#authNavBtn.signout {
      border: 1px solid white;
      padding: 4px 16px;
      border-radius: 6px;
    }
  </style>
</head>

<body>
  <img class="bg" src="../images/site2.avif" alt="" />
  <div class="overlay"></div>

  <div class="header">
    <a href="/" class="brand">
      <img class="brand-logo" src="../images/logo3.jpg" />
      <span class="brand-name">SiteAudit</span>
    </a>

    <div class="nav">
      <a href="/">Home</a>
      <a href="#" onclick="guardedNav(event, '/materiallog', 'Logs')">Logs</a>
      <a href="#" onclick="guardedNav(event, '/gallery', 'Gallery')">Reports</a>
      <a href="/about">About</a>

      <span class="user-greeting" id="userGreeting">
        <img id="userAvatar" />
        <span id="userName"></span>
      </span>

      <a href="#" id="authNavBtn" onclick="handleAuthClick(event)">Login</a>
    </div>
  </div>

  <div class="main">
    <h1>About Us</h1>
    <p>
      At SiteAudit, we bring precision and accountability to construction
      quality assurance through consistent monitoring and structured
      reporting.
    </p>
  </div>

  <script>
    const authBtn = document.getElementById("authNavBtn");
    const userGreeting = document.getElementById("userGreeting");
    const userNameEl = document.getElementById("userName");
    const userAvatarEl = document.getElementById("userAvatar");

    function updateNav() {
      const raw = localStorage.getItem("user");
      if (raw) {
        const user = JSON.parse(raw);
        userNameEl.textContent = user.name || user.email;
        userGreeting.classList.add("visible");
        authBtn.textContent = "Sign Out";
      } else {
        userGreeting.classList.remove("visible");
        authBtn.textContent = "Login";
        authBtn.href = "/login";
      }
    }

    function handleAuthClick(e) {
      const raw = localStorage.getItem("user");
      if (raw) {
        e.preventDefault();
        localStorage.removeItem("user");
        updateNav();
      }
    }

    function guardedNav(e, url) {
      e.preventDefault();
      if (localStorage.getItem("user")) {
        window.location.href = url;
      } else {
        alert("Please login first");
      }
    }

    updateNav();
  </script>

</body>

</html>
